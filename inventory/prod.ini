[proxy]
proxy1 ansible_host=10.2.2.20
proxy2 ansible_host=10.2.2.21

# Patroni 클러스터 멤버(Primary/Standby)만
# Patroni 클러스터 멤버 (Primary / Standby)
[db_cluster]
db-a ansible_host=10.2.3.2
db-s ansible_host=10.2.3.3

# 백업 전용 DB 노드(클러스터 멤버 아님)
# 백업 전용 DB 노드 (클러스터 멤버 아님)
[db_backup]
dbb ansible_host=10.2.3.4

[etcd]
etcd-1 ansible_host=10.2.3.20
etcd-2 ansible_host=10.2.3.21
etcd-3 ansible_host=10.2.3.22

# 백업 저장소/NFS 서버
# 백업 스토리지 / NFS 서버
# backup role 대상 분리
# - 백업 클라이언트(dbb)에서 로컬 디스크로 Full Copy 백업 실행
# -----------------------------
# Backup role 대상 분리
# -----------------------------
[backup_clients:children]
db_backup

# -----------------------------
# 공통 접속 설정 (PC5 기준)
# -----------------------------
[all:vars]
ansible_user=ansible
ansible_become=true

# 🔑 PC5에서 사용하는 SSH 키
ansible_ssh_private_key_file=~/.ssh/PC5-CICD-OPS

# Python 경로 고정 (RHEL/CentOS Stream 9)
ansible_python_interpreter=/usr/bin/python3

# 첫 접속 시 known_hosts 문제 방지
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# -----------------------------
# DB 서버 ProxyJump 설정 (10.2.3.x)
# -----------------------------
[db_cluster:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -q root@10.2.2.20"'

[db_backup:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -q root@10.2.2.20"'

[etcd:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -q root@10.2.2.20"'
